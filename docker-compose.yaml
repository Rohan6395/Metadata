services:
  api:
    build: .
    container_name: metadata_api
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=metadata_db

  mongodb:
    image: mongo:6
    container_name: metadata_mongo
    ports:
      - "27017:27017"

  # Run all tests
  test:
    build: .
    container_name: metadata_test
    depends_on:
      - mongodb
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=metadata_db_test
      - PYTHONPATH=/app
    command: python -m pytest cloudsek/tests/ -v
    profiles:
      - test

  # Run only unit tests (no DB required)
  test-unit:
    build: .
    container_name: metadata_test_unit
    environment:
      - PYTHONPATH=/app
    command: python -m pytest cloudsek/tests/unit/ -v
    profiles:
      - test-unit

  # Run only integration tests (requires DB)
  test-integration:
    build: .
    container_name: metadata_test_integration
    depends_on:
      - mongodb
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=metadata_db_test
      - PYTHONPATH=/app
    command: python -m pytest cloudsek/tests/integration/ -v
    profiles:
      - test-integration
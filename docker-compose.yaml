version: "3.8"

services:
  api:
    build: .
    container_name: metadata_api
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=metadata_db

  mongodb:
    image: mongo:6
    container_name: metadata_mongo
    ports:
      - "27017:27017"